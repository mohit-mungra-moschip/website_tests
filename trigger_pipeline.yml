name: 🔔 Trigger RegressionAI Pipeline

# Fires on every push to main in the test repo.
# Dispatches a repository_dispatch event to website_app to run the full pipeline
# with Jira creation enabled and 3 healing iterations.

on:
  push:
    branches:
      - main

jobs:
  trigger-pipeline:
    name: Dispatch to RegressionAI
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Trigger website_app regression workflow
        env:
          DISPATCH_TOKEN: ${{ secrets.TEST_REPO_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "❌ Error: The secret 'TEST_REPO_TOKEN' is not defined in this repository (website_tests)."
            echo "=========================================================================="
            echo "To fix this and enable automatic triggering:"
            echo "1. Create a GitHub Personal Access Token (PAT) with 'repo' scope."
            echo "2. Go to your website_tests repository on GitHub."
            echo "3. Navigate to Settings -> Secrets and variables -> Actions."
            echo "4. Click 'New repository secret'."
            echo "5. Name it: TEST_REPO_TOKEN"
            echo "6. Paste your PAT as the value."
            echo "=========================================================================="
            exit 1
          fi

          echo "Sending repository dispatch to website_app..."
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN"\
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mohit-mungra-moschip/website_app/dispatches \
            -d "{\"event_type\": \"test-repo-push\", \"client_payload\": {\"triggered_by\": \"website_tests\", \"ref\": \"${{ github.ref }}\", \"sha\": \"${{ github.sha }}\", \"actor\": \"${{ github.actor }}\"}}"

          echo "✅ Dispatch sent to website_app — pipeline will start with create_jira=true, max_iter=3"
